{% set name = "cut_cross_entropy" %}
{% set version = "25.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cut_cross_entropy-{{ version }}.tar.gz
  sha256: 5fe5924509248b1aea5c890f8887c6a7759f7c8b1ebc0490e42c247c4f7c1e34

build:
  number: 0
  # triton (a hard runtime dep on Linux) is only available on linux-64 on pkgs/main
  skip: true  # [not linux64]
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
    - setuptools-scm
    - wheel
  run:
    - python
    - pytorch
    - triton

test:
  imports:
    - cut_cross_entropy
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/unslothai/cut_cross_entropy
  license: LicenseRef-Apple
  license_file: LICENSE
  summary: A memory efficient implementation of linear-cross-entropy loss.
  description: |
    Cut Cross-Entropy (CCE) is a memory-efficient implementation of the
    linear-cross-entropy loss used when training large language models. It
    computes the cross-entropy loss without materializing the full logits
    matrix in global memory, using custom Triton kernels, which substantially
    reduces memory usage during training.
  doc_url: https://github.com/unslothai/cut_cross_entropy
  dev_url: https://github.com/unslothai/cut_cross_entropy

extra:
  skip-lints:
    # pytorch is a CBC-pinned runtime-only dep (pure-Python; not linked at build)
    - cbc_dep_in_run_missing_from_host
  recipe-maintainers:
    - isuruf
